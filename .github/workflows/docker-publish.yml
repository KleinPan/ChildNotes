name: Docker Image

# 触发条件与 release.yml 保持一致
on:
  push:
    tags:
      - 'v*'
      - 'release-*'
  workflow_dispatch:
    inputs:
      ref:
        description: '要构建的分支/tag/commit'
        required: false
        default: ''

permissions:
  contents: read
  packages: write   # 推送 GHCR 镜像

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            latest

      - name: Parse version from git tag
        id: version
        shell: bash
        run: |
          RAW_TAG="${{ github.ref_name }}"
          VERSION="${RAW_TAG#v}"
          VERSION="${VERSION%%-*}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Parsed version: $VERSION"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ChildNotes.Backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          # 单平台构建时加载到本地 docker daemon，供后续验证步骤 inspect
          # 注意：多平台时需移除此项并改用 docker pull + inspect
          load: true

      - name: Verify Docker image version
        shell: bash
        run: |
          EXPECTED="${{ steps.version.outputs.version }}"
          IMAGE="ghcr.io/${{ github.repository }}/api:latest"

          # buildx 推送后本地无镜像，load:true 已将单平台镜像加载到本地 daemon
          # 若 inspect 仍失败，回退到 pull 远程镜像
          if ! docker inspect "$IMAGE" >/dev/null 2>&1; then
            echo "本地未找到镜像，尝试拉取..."
            docker pull "$IMAGE"
          fi

          # 从镜像标签中读取版本号
          ACTUAL=$(docker inspect "$IMAGE" --format '{{ index .Config.Labels "org.opencontainers.image.version" }}' 2>/dev/null || echo "unknown")
          echo "Docker image version label: $ACTUAL"

          if [[ "$ACTUAL" != "$EXPECTED" ]]; then
            echo "::error::Docker 镜像版本号不匹配！期望: $EXPECTED, 实际: $ACTUAL"
            exit 1
          fi

          echo "::notice::Docker 镜像版本号验证通过: $ACTUAL"

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "### Docker 镜像已推送至 GHCR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "版本号: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
