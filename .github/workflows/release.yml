name: Release Build

# 触发条件：推送 tag 时执行
# 建议使用 v* 或 release-* 前缀，例如 v1.0.0、release-2026.06.1
on:
  push:
    tags:
      - 'v*'
      - 'release-*'
  workflow_dispatch:
    inputs:
      ref:
        description: '要构建的分支/tag/commit'
        required: false
        default: ''

permissions:
  contents: write   # 用于创建 Release 并上传资源

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  # 统一固定 .NET SDK 版本，配合仓库根目录的 global.json
  DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: '0'

jobs:
  # -----------------------------------------------------------------
  # 构建 Job 矩阵：
  #   客户端 - Windows desktop / Android / iOS
  #   服务端 - Linux Ubuntu
  # -----------------------------------------------------------------
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false   # 单个平台失败不影响其他平台继续构建，便于一次性看到所有错误
      matrix:
        include:
          # 客户端 - Windows 桌面版（自包含，win-x64）
          - target: windows
            runner: windows-latest
          # 客户端 - Android 版（APK）
          - target: android
            runner: ubuntu-latest
          # 服务端 - Linux Ubuntu 版（自包含，linux-x64）
          - target: backend
            runner: ubuntu-latest
          # 注：iOS 不在 CI 构建矩阵中
          # 原因：.NET 10 iOS SDK 强制 PublishTrimmed=true，ILLink 在 macOS runner 上分析
          #       大量程序集耗时极长（>45min），且各种关闭 trimming 的属性组合均无效。
          #       产物本身是未签名 .app，用户仍需 Mac + 开发者证书重签才能安装，
          #       能重签的用户也能自行 `dotnet publish`。如需本地构建命令参见 Release notes。

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          # global.json 指定 10.0.x；rollForward=latestFeature 允许 runner 上的更高 patch
          dotnet-version: '10.0.x'

      - name: Show environment info
        shell: pwsh
        run: |
          dotnet --info
          Write-Host "Target: ${{ matrix.target }}"

      # ===============================================================
      # 版本号解析：从 git tag 提取语义化版本号
      # tag 格式: v0.3.0 → VERSION=0.3.0, VERSION_MAJOR=0, VERSION_MINOR=3, VERSION_PATCH=0
      # ===============================================================
      - name: Parse version from git tag
        id: version
        shell: bash
        run: |
          RAW_TAG="${{ github.ref_name }}"
          # 去掉 v 前缀
          VERSION="${RAW_TAG#v}"
          # 提取主.次.修订号（去掉 pre-release 后缀，如 -rc.1）
          VERSION="${VERSION%%-*}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Parsed version: $VERSION"
          echo "::notice::Git tag: $RAW_TAG → Version: $VERSION"

      # ===============================================================
      # 客户端 - Windows 桌面版
      # ===============================================================
      - name: Build Windows desktop app
        if: matrix.target == 'windows'
        shell: pwsh
        working-directory: ChildNotes
        run: |
          # Avalonia 桌面端，按 RID 发布为自包含可执行文件
          dotnet publish ChildNotes.Desktop/ChildNotes.Desktop.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishTrimmed=false `
            -p:Version=${{ steps.version.outputs.version }} `
            -o ../artifacts/windows

      - name: Archive Windows desktop artifacts
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $staging = "staging-windows"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item -Recurse -Force artifacts/windows/* $staging/
          Compress-Archive -Path "$staging/*" -DestinationPath "ChildNotes-windows-${{ github.ref_name }}.zip" -CompressionLevel Optimal
          Write-Host "::notice::Archive created: ChildNotes-windows-${{ github.ref_name }}.zip"

      # ===============================================================
      # 客户端 - Android 版（APK）
      # ===============================================================
      - name: Install Android workload
        if: matrix.target == 'android'
        shell: bash
        run: dotnet workload install android

      - name: Build Android app
        if: matrix.target == 'android'
        shell: bash
        working-directory: ChildNotes
        run: |
          # .NET 10 + Avalonia.Android，产出 APK（默认 debug 签名，可自行重签）
          dotnet publish ChildNotes.Android/ChildNotes.Android.csproj \
            -c Release \
            -f net10.0-android \
            -p:AndroidPackageFormat=apk \
            -p:PublishTrimmed=false \
            -p:Version=${{ steps.version.outputs.version }} \
            -o ../artifacts/android

      - name: Collect Android APK
        if: matrix.target == 'android'
        shell: bash
        run: |
          mkdir -p staging-android
          # publish 目录下可能产生 *-Signed.apk 或 *.apk，全部收集
          find artifacts/android -name '*.apk' -exec cp {} staging-android/ \;
          if [ -z "$(ls -A staging-android 2>/dev/null)" ]; then
            echo "::error::未找到 APK 产物"
            exit 1
          fi
          ls -la staging-android/
          # 取第一个 apk 作为发布产物（如有多个，可按需调整）
          APK_FILE=$(find staging-android -name '*.apk' | head -n 1)
          cp "$APK_FILE" "ChildNotes-android-${{ github.ref_name }}.apk"
          echo "::notice::APK created: ChildNotes-android-${{ github.ref_name }}.apk"

      # ===============================================================
      # 客户端 - iOS 版
      # ---------------------------------------------------------------
      # 不在 CI 构建。原因：
      # 1. .NET 10 iOS SDK 强制 PublishTrimmed=true，ILLink 在 macOS runner 上
      #    分析大量程序集耗时极长（>45min），各种关闭 trimming 的属性组合均无效。
      # 2. CI 产物是未签名 .app，用户仍需 Mac + 开发者证书重签才能安装，
      #    能重签的用户也能自行 `dotnet publish`。
      # 本地构建命令（需 Mac + Xcode + dotnet workload install ios）：
      #   dotnet publish ChildNotes.iOS/ChildNotes.iOS.csproj \
      #     -c Release -f net10.0-ios -r ios-arm64 \
      #     -p:RuntimeIdentifier=ios-arm64 \
      #     -p:EnableCodeSigning=false -p:CodesignEntitlements= \
      #     -p:PublishTrimmed=true -p:MtouchLink=None -p:TrimMode=copy \
      #     -o ./artifacts/ios
      # ===============================================================

      # ===============================================================
      # 服务端 - Linux Ubuntu 版
      # ===============================================================
      - name: Build backend (publish)
        if: matrix.target == 'backend'
        shell: pwsh
        working-directory: ChildNotes.Backend
        run: |
          # 以独立部署(SCD)方式发布，产物内含运行时，目标机器无需额外安装 .NET
          dotnet publish ChildNotes.Api/ChildNotes.Api.csproj `
            -c Release `
            -r linux-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishTrimmed=false `
            -p:Version=${{ steps.version.outputs.version }} `
            -o ../artifacts/backend

          # 确保配置文件随产物输出（dotnet publish 默认会复制，这里再显式确认）
          Copy-Item ChildNotes.Api/appsettings.json ../artifacts/backend/ -Force -ErrorAction SilentlyContinue

      - name: Archive backend artifacts
        if: matrix.target == 'backend'
        shell: bash
        run: |
          mkdir -p staging-backend
          cp -r artifacts/backend/* staging-backend/
          tar -czf "ChildNotes-backend-${{ github.ref_name }}.tar.gz" -C "staging-backend" .
          echo "::notice::Archive created: ChildNotes-backend-${{ github.ref_name }}.tar.gz"

      # ===============================================================
      # 版本号验证：确保构建产物中的版本号与 git tag 一致
      # ===============================================================
      - name: Verify version in build artifacts
        if: always() && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          EXPECTED="${{ steps.version.outputs.version }}"
          echo "Expected version: $EXPECTED"

          if [ "${{ matrix.target }}" = "backend" ] && [ -d "artifacts/backend" ]; then
            # 验证后端 DLL 的 InformationalVersion
            ACTUAL=$(dotnet artifacts/backend/ChildNotes.Api.dll --version 2>/dev/null || echo "unknown")
            echo "Backend assembly version: $ACTUAL"
            if [[ "$ACTUAL" != *"$EXPECTED"* ]]; then
              echo "::error::后端版本号不匹配！期望: $EXPECTED, 实际: $ACTUAL"
              exit 1
            fi
            echo "::notice::后端版本号验证通过: $ACTUAL"
          fi

          if [ "${{ matrix.target }}" = "android" ] && [ -d "staging-android" ]; then
            # Android 版本号在构建日志中可见（通过 -p:Version 传入）
            echo "::notice::Android 版本号已通过 -p:Version=$EXPECTED 注入"
          fi

          if [ "${{ matrix.target }}" = "windows" ] && [ -d "artifacts/windows" ]; then
            # Windows 版本号验证
            echo "::notice::Windows 版本号已通过 -p:Version=$EXPECTED 注入"
          fi

          echo "::notice::[${{ matrix.target }}] 版本号验证完成: $EXPECTED"

      # ===============================================================
      # 上传构建产物（workflow artifact，供 release job 下载）
      # ===============================================================
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChildNotes-${{ matrix.target }}-${{ github.ref_name }}
          path: |
            ChildNotes-windows-${{ github.ref_name }}.zip
            ChildNotes-android-${{ github.ref_name }}.apk
            ChildNotes-backend-${{ github.ref_name }}.tar.gz
          if-no-files-found: error
          retention-days: 30

      - name: Summarize build status
        if: always()
        shell: pwsh
        run: |
          $status = '${{ job.status }}'
          if ($status -eq 'success') {
            Write-Host "::notice::[${{ matrix.target }}] 构建成功。产物已打包。"
          } else {
            Write-Host "::error::[${{ matrix.target }}] 构建失败 (status=$status)，请检查上方日志。"
          }

  # -----------------------------------------------------------------
  # 发布 Release：所有平台构建完成后，将压缩包作为 GitHub Release 资源发布
  # （Docker 镜像由独立 workflow docker-publish.yml 并行构建）
  # -----------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 10

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: false

      - name: Flatten artifacts for release upload
        shell: bash
        run: |
          mkdir -p upload
          find release-assets -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.apk' \) -exec cp {} upload/ \;
          ls -la upload/

      - name: Check build matrix status
        id: status
        shell: bash
        run: |
          # needs.build.result: success / failure / cancelled
          RESULT="${{ needs.build.result }}"
          echo "result=$RESULT" >> $GITHUB_OUTPUT
          if [ "$RESULT" != "success" ]; then
            echo "::error::构建矩阵未全部成功 (result=$RESULT)，终止发布。"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: upload/*
          body: |
            ## 构建产物

            本次发布包含以下平台的编译产物：

            | 平台 | 文件 | 说明 |
            | ---- | ---- | ---- |
            | Windows 桌面 | `ChildNotes-windows-*.zip` | 自包含（self-contained），解压后运行可执行文件，无需安装 .NET |
            | Android | `ChildNotes-android-*.apk` | APK 安装包（debug 签名），生产环境请用正式签名重签 |
            | 服务端 | `ChildNotes-backend-*.tar.gz` | ASP.NET Core 后端 API，Linux Ubuntu 自包含部署 |
            | Docker 镜像 | `ghcr.io/${{ github.repository }}/api:*` | 推送至 GitHub Container Registry |

            ### Docker 部署（推荐）
            ```bash
            # 1. 在服务器上创建 .env 文件
            cat > ChildNotes.Backend/.env << 'EOF'
            DB_PASSWORD=your-strong-password
            JWT_SECRET=your-production-jwt-secret-at-least-32-chars
            ADMIN_PASSWORD=your-admin-password
            DEEPSEEK_API_KEY=sk-xxx
            EOF

            # 2. 拉取代码中的 docker-compose.yml 并启动
            git clone --depth 1 -b ${{ github.ref_name }} {{ github.server_url }}/{{ github.repository }}.git repo
            cd repo/ChildNotes.Backend
            cp ../.env .
            docker compose up -d

            # 或直接拉取镜像手动运行
            docker pull ghcr.io/${{ github.repository }}/api:${{ github.ref_name }}
            ```

            ### 服务端传统部署
            - 解压 `ChildNotes-backend-*.tar.gz` 后编辑 `appsettings.json`，填写数据库连接串、JWT Secret、DeepSeek ApiKey 等敏感配置。
            - 运行：`./ChildNotes.Api`
            - 目标机器为 Linux Ubuntu，无需额外安装 .NET 运行时。

            ### iOS 构建说明
            - iOS 产物**不在 CI 中构建**。原因：.NET 10 iOS SDK 强制启用 `PublishTrimmed=true`，
              ILLink 在 GitHub Actions 的 macOS runner 上分析大量程序集耗时极长（>45min），
              各种关闭 trimming 的属性组合均无效，导致构建超时。
            - 如需 iOS 版本，请在 Mac 上本地构建（需 Xcode + `dotnet workload install ios`）：
              ```bash
              dotnet publish ChildNotes.iOS/ChildNotes.iOS.csproj \
                -c Release -f net10.0-ios -r ios-arm64 \
                -p:RuntimeIdentifier=ios-arm64 \
                -p:EnableCodeSigning=false -p:CodesignEntitlements= \
                -p:PublishTrimmed=true -p:MtouchLink=None -p:TrimMode=copy \
                -o ./artifacts/ios
              ```
            - 产物为**未签名**的 `.app` 包，需用开发者证书重签后通过 Xcode / AltStore / Sideloadly 安装。

            ### Android 部署说明
            - APK 使用 debug 签名，生产环境请用正式签名重签后再发布。
            - 安装时需在设备上开启"允许安装未知来源应用"。

            ### 构建状态
            - 构建矩阵结果：${{ needs.build.result }}
            - 对应 commit：${{ github.sha }}

      - name: Release summary
        if: always()
        shell: bash
        run: |
          echo "::notice::Release 发布完成，访问 https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }} 下载各平台产物。"
