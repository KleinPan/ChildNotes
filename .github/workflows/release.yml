name: Release Build

# 触发条件：推送 tag 时执行
# 建议使用 v* 或 release-* 前缀，例如 v1.0.0、release-2026.06.1
on:
  push:
    tags:
      - 'v*'
      - 'release-*'
  workflow_dispatch:
    inputs:
      ref:
        description: '要构建的分支/tag/commit'
        required: false
        default: ''

permissions:
  contents: write   # 用于创建 Release 并上传资源

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  # 统一固定 .NET SDK 版本，配合仓库根目录的 global.json
  DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: '0'

jobs:
  # -----------------------------------------------------------------
  # 构建 Job 矩阵：
  #   客户端 - Windows desktop / Android / iOS
  #   服务端 - Linux Ubuntu
  # -----------------------------------------------------------------
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false   # 单个平台失败不影响其他平台继续构建，便于一次性看到所有错误
      matrix:
        include:
          # 客户端 - Windows 桌面版（自包含，win-x64）
          - target: windows
            runner: windows-latest
          # 客户端 - Android 版（APK）
          - target: android
            runner: ubuntu-latest
          # 服务端 - Linux Ubuntu 版（自包含，linux-x64）
          - target: backend
            runner: ubuntu-latest
          # 注：iOS 不在 CI 构建矩阵中
          # 原因：.NET 10 iOS SDK 强制 PublishTrimmed=true，ILLink 在 macOS runner 上分析
          #       大量程序集耗时极长（>45min），且各种关闭 trimming 的属性组合均无效。
          #       产物本身是未签名 .app，用户仍需 Mac + 开发者证书重签才能安装，
          #       能重签的用户也能自行 `dotnet publish`。如需本地构建命令参见 Release notes。

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          # global.json 指定 10.0.x；rollForward=latestFeature 允许 runner 上的更高 patch
          dotnet-version: '10.0.x'

      - name: Show environment info
        shell: pwsh
        run: |
          dotnet --info
          Write-Host "Target: ${{ matrix.target }}"

      # ===============================================================
      # 版本号解析：从 git tag 提取语义化版本号
      # tag 格式: v0.3.0 → VERSION=0.3.0, VERSION_MAJOR=0, VERSION_MINOR=3, VERSION_PATCH=0
      # 非 tag ref（如 workflow_dispatch 手动触发未指定 tag）→ 回退到 0.0.0
      # ===============================================================
      - name: Parse version from git tag
        id: version
        shell: bash
        run: |
          RAW_TAG="${{ github.ref_name }}"
          # 去掉 v 前缀
          VERSION="${RAW_TAG#v}"
          # 提取主.次.修订号（去掉 pre-release 后缀，如 -rc.1）
          VERSION="${VERSION%%-*}"
          # 校验是否为合法 SemVer（x.y.z），非 tag ref 回退到 0.0.0
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::warning::Ref '$RAW_TAG' 不是合法的版本号 tag，回退到 0.0.0"
            VERSION="0.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # 计算 Android versionCode（Major*10000 + Minor*100 + Patch）
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Parsed version: $VERSION (versionCode: $VERSION_CODE)"
          echo "::notice::Git tag: $RAW_TAG → Version: $VERSION"

      # ===============================================================
      # 客户端 - Windows 桌面版
      # ===============================================================
      - name: Build Windows desktop app
        if: matrix.target == 'windows'
        shell: pwsh
        working-directory: ChildNotes
        run: |
          # Avalonia 桌面端，按 RID 发布为自包含可执行文件
          # -m:1 禁用多节点并行，避免 VBCSCompiler 后台进程锁住 obj/*.dll（CS2012）
          # -p:UseSharedCompilation=false 禁用 VBCSCompiler 共享编译服务器，彻底消除文件锁
          dotnet publish ChildNotes.Desktop/ChildNotes.Desktop.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -m:1 `
            -p:PublishSingleFile=false `
            -p:PublishTrimmed=false `
            -p:UseSharedCompilation=false `
            -p:Version=${{ steps.version.outputs.version }} `
            -o ../artifacts/windows

      - name: Archive Windows desktop artifacts
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          $staging = "staging-windows"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item -Recurse -Force artifacts/windows/* $staging/
          Compress-Archive -Path "$staging/*" -DestinationPath "ChildNotes-windows-${{ github.ref_name }}.zip" -CompressionLevel Optimal
          Write-Host "::notice::Archive created: ChildNotes-windows-${{ github.ref_name }}.zip"

      # ===============================================================
      # 客户端 - Android 版（APK）
      # ===============================================================
      - name: Install Android workload
        if: matrix.target == 'android'
        shell: bash
        run: dotnet workload install android

      # ===============================================================
      # Android 固定签名：从 GitHub Secrets 解码 keystore 到临时文件
      # 依赖仓库 Secrets：
      #   ANDROID_KEYSTORE_BASE64  - keystore 文件的 base64 编码
      #   ANDROID_KEYSTORE_PASS    - keystore 密码
      #   ANDROID_KEY_ALIAS        - 签名 key 别名
      #   ANDROID_KEY_PASS         - key 密码
      # 未配置 Secrets 时跳过签名，回退到默认 debug 签名（无法覆盖安装）
      #
      # ★ 注意：GitHub Actions 的 `if` 条件无法直接读 secrets（secrets 不在 if 上下文里），
      #   所以 Decode 步骤总是执行，在 step 内部用 bash 判断 base64 是否为空。
      # ===============================================================
      - name: Decode Android signing keystore
        if: matrix.target == 'android'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
        shell: bash
        run: |
          echo "=== Secrets 诊断（不打印密码值）==="
          echo "ANDROID_KEYSTORE_BASE64 长度: ${#ANDROID_KEYSTORE_BASE64}"
          echo "ANDROID_KEYSTORE_BASE64 前 20 字符: ${ANDROID_KEYSTORE_BASE64:0:20}..."
          echo "ANDROID_KEYSTORE_BASE64 末尾 20 字符: ...${ANDROID_KEYSTORE_BASE64: -20}"
          echo "ANDROID_KEYSTORE_PASS 长度: ${#ANDROID_KEYSTORE_PASS}"
          echo "ANDROID_KEY_ALIAS 值: $ANDROID_KEY_ALIAS"
          echo "ANDROID_KEY_PASS 长度: ${#ANDROID_KEY_PASS}"
          echo ""

          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 Secret 为空！请检查 Secret 名字和值"
            exit 1
          fi

          echo "=== 解码 keystore ==="
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > $HOME/childnotes.keystore
          if [ ! -f "$HOME/childnotes.keystore" ]; then
            echo "::error::keystore 文件未生成"
            exit 1
          fi
          echo "Keystore 文件路径: $HOME/childnotes.keystore"
          ls -la $HOME/childnotes.keystore
          echo "文件大小(bytes): $(wc -c < $HOME/childnotes.keystore)"
          echo "文件前 4 字节(hex): $(xxd -l 4 $HOME/childnotes.keystore)"
          echo ""

          echo "=== 验证 keystore 是否有效 ==="
          if [ -n "$JAVA_HOME" ] && [ -f "$JAVA_HOME/bin/keytool" ]; then
            "$JAVA_HOME/bin/keytool" -list -keystore $HOME/childnotes.keystore -storepass "$ANDROID_KEYSTORE_PASS" 2>&1 | head -20
          else
            echo "keytool 不在 JAVA_HOME，尝试 PATH"
            keytool -list -keystore $HOME/childnotes.keystore -storepass "$ANDROID_KEYSTORE_PASS" 2>&1 | head -20 || echo "keytool 验证失败（不阻塞构建）"
          fi

      - name: Clean Android build cache
        if: matrix.target == 'android'
        shell: bash
        working-directory: ChildNotes
        run: |
          # 清理所有相关项目的 bin/obj 目录，避免：
          # 1. R8/D8 因缓存损坏而崩溃
          # 2. GenerateDepsFile 任务写入 deps.json 时文件锁冲突（MSB4018 IOException）
          #    （上一次 CI 构建的残留文件可能仍被进程占用）
          rm -rf ChildNotes.Android/obj ChildNotes.Android/bin \
                 ChildNotes/obj ChildNotes/bin \
                 ../ChildNotes.Shared/obj ../ChildNotes.Shared/bin
          echo "::notice::Android build cache cleaned (bin+obj for all projects)"

      - name: Build Android app
        if: matrix.target == 'android'
        shell: bash
        working-directory: ChildNotes
        env:
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
          # R8/D8 是 JVM 工具，增大堆内存防止 OOM 崩溃（默认堆可能不足处理 Avalonia + AndroidX 全量类）
          _JAVA_OPTIONS: '-Xmx4g'
        run: |
          # .NET 10 + Avalonia.Android，产出两个 APK：
          #   1. 正式版（prod）：com.babydiary.app，移除开发者选项/日志导出，服务器地址只读
          #   2. 开发版（dev）：com.babydiary.app.dev，保留全部开发者功能
          # 两个版本使用相同 keystore 签名，可共存安装。
          #
          # 签名：若 Secrets 已配置（keystore 文件存在），通过 -p: 注入固定签名参数；
          #       否则回退到默认 debug 签名（无法覆盖安装，仅用于测试构建）
          SIGN_ARGS=()
          if [ -f "$HOME/childnotes.keystore" ]; then
            # ★★★ AndroidKeyStore=true 是开启自定义 keystore 的总开关，必须显式传入，
            #     否则即使传了 AndroidSigningKeyStore/KeyAlias/StorePass/KeyPass 也不会生效，
            #     会静默回退到 debug 签名（每次 CI 构建签名都不同，导致无法覆盖安装）。
            SIGN_ARGS=(-p:AndroidKeyStore=true
              -p:AndroidSigningKeyStore=$HOME/childnotes.keystore
              -p:AndroidSigningStorePass=$ANDROID_KEYSTORE_PASS
              -p:AndroidSigningKeyAlias=$ANDROID_KEY_ALIAS
              -p:AndroidSigningKeyPass=$ANDROID_KEY_PASS)
            echo "::notice::使用固定 keystore 签名（AndroidKeyStore=true）"
          else
            echo "::warning::未配置 ANDROID_KEYSTORE_BASE64 Secret，使用默认 debug 签名（无法覆盖安装旧版本）"
          fi

          VERSION="${{ steps.version.outputs.version }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"

          echo "=== 构建正式版 APK（prod）==="
          # -m:1 禁用 MSBuild 多节点并行，避免 .NET 10 SDK 10.0.302+ 并行构建时
          # 多节点争抢写 ChildNotes.Shared.deps.json 触发 IOException（v0.6.11 曾出现）
          # -p:UseSharedCompilation=false 禁用 VBCSCompiler 共享编译服务器，避免文件锁
          dotnet publish ChildNotes.Android/ChildNotes.Android.csproj \
            -c Release \
            -f net10.0-android \
            -m:1 \
            -p:AndroidPackageFormat=apk \
            -p:PublishTrimmed=false \
            -p:SourceRevisionId= \
            -p:UseSharedCompilation=false \
            -p:Version=$VERSION \
            -p:InformationalVersion=$VERSION \
            -p:ApplicationDisplayVersion=$VERSION \
            -p:ApplicationVersion=$VERSION_CODE \
            "${SIGN_ARGS[@]}" \
            -o ../artifacts/android-prod

          echo "=== 构建开发版 APK（dev）==="

          # ★★★ 清理 prod 构建的 obj/bin 缓存，避免增量构建复用 prod 产物
          # 1. obj 缓存：DevBuild=true 改变编译常量导致 Java 类名 CRC 不同，复用会触发
          #    UnsatisfiedLinkError: No implementation found for n_onCreate() → 启动即闪退
          # 2. bin 缓存：prod 构建生成的 AndroidManifest.xml（包名 com.babydiary.app）若未被清理，
          #    dev 构建的增量判断可能复用该 manifest，导致 dev APK 包名不是 com.babydiary.app.dev
          #    （v0.6.9 曾出现此问题：dev APK 实际为正式版包名，安装后与正式版冲突而非共存）
          rm -rf ChildNotes.Android/obj ChildNotes.Android/bin ChildNotes/obj ChildNotes/bin
          echo "::notice::Cleaned obj+bin cache before dev build"

          # DevBuild=true 注入 DEV_BUILD 编译常量
          # ★ 包名切换：用 sed 临时修改 csproj 中的 ApplicationId 为 com.babydiary.app.dev
          #   不用条件属性/命令行 -p:/ApplicationIdSuffix 的原因见 csproj 注释。
          #   构建后用 git checkout 还原 csproj，避免污染工作区。
          echo "=== sed before: ==="
          grep '<ApplicationId>' ChildNotes.Android/ChildNotes.Android.csproj
          sed -i 's|<ApplicationId>com.babydiary.app</ApplicationId>|<ApplicationId>com.babydiary.app.dev</ApplicationId>|' ChildNotes.Android/ChildNotes.Android.csproj
          echo "=== sed after: ==="
          grep '<ApplicationId>' ChildNotes.Android/ChildNotes.Android.csproj
          echo "::notice::Temporarily set ApplicationId to com.babydiary.app.dev for dev build"

          dotnet publish ChildNotes.Android/ChildNotes.Android.csproj \
            -c Release \
            -f net10.0-android \
            -m:1 \
            -p:AndroidPackageFormat=apk \
            -p:PublishTrimmed=false \
            -p:SourceRevisionId= \
            -p:UseSharedCompilation=false \
            -p:Version=$VERSION \
            -p:InformationalVersion=$VERSION \
            -p:ApplicationDisplayVersion=$VERSION \
            -p:ApplicationVersion=$VERSION_CODE \
            -p:DevBuild=true \
            "${SIGN_ARGS[@]}" \
            -o ../artifacts/android-dev

          # 还原 csproj 临时修改
          git checkout -- ChildNotes.Android/ChildNotes.Android.csproj
          echo "::notice::Restored ChildNotes.Android.csproj after dev build"

          # ★★★ 验证 dev APK 包名：确保 sed 修改生效，ApplicationId 为 com.babydiary.app.dev
          # 若包名不是 .dev，dev APK 会与正式版冲突（非共存）
          DEV_APK_FILE=$(find ../artifacts/android-dev -name '*.apk' | head -1)
          if [ -n "$DEV_APK_FILE" ]; then
            # 二进制 AndroidManifest.xml 中包名为 UTF-16LE 编码，用 strings -e l 提取
            # strings 可能在不同字节边界断开，因此直接检查是否包含完整目标字符串
            MANIFEST_STRINGS=$(unzip -p "$DEV_APK_FILE" AndroidManifest.xml | strings -e l)
            if echo "$MANIFEST_STRINGS" | grep -q 'com.babydiary.app.dev'; then
              echo "::notice::dev APK 包名验证通过：com.babydiary.app.dev"
            else
              echo "::error::dev APK 包名异常：未在 AndroidManifest.xml 中找到 com.babydiary.app.dev"
              echo "--- AndroidManifest strings (含 babydiary 的行) ---"
              echo "$MANIFEST_STRINGS" | grep 'babydiary' || echo "(未找到任何含 babydiary 的字符串)"
              exit 1
            fi
          fi

      - name: Collect and sign Android APK
        if: matrix.target == 'android'
        shell: bash
        env:
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
        run: |
          mkdir -p staging-android

          # 查找 Android SDK build-tools 目录（含 zipalign 和 apksigner）
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ 2>/dev/null | sort -V | tail -1)
          if [ -z "$BUILD_TOOLS" ]; then
            BUILD_TOOLS=$(ls -d $ANDROID_SDK_ROOT/build-tools/*/ 2>/dev/null | sort -V | tail -1)
          fi
          if [ -z "$BUILD_TOOLS" ]; then
            # GitHub Actions ubuntu runner 的 SDK 路径
            BUILD_TOOLS=$(ls -d /usr/local/lib/android/sdk/build-tools/*/ 2>/dev/null | sort -V | tail -1)
          fi
          echo "Build tools: $BUILD_TOOLS"

          # 检查是否有 keystore，决定是否手动签名
          KSTORE="$HOME/childnotes.keystore"
          if [ ! -f "$KSTORE" ]; then
            echo "::warning::No keystore found, copying unsigned APKs"
            find artifacts/android-prod -name '*.apk' -exec cp {} staging-android/ChildNotes-android-prod-${{ github.ref_name }}.apk \;
            find artifacts/android-dev -name '*.apk' -exec cp {} staging-android/ChildNotes-android-dev-${{ github.ref_name }}.apk \;
          else
            # 函数：zipalign + apksigner 签名单个 APK
            sign_apk() {
              local SRC="$1"
              local DST="$2"
              local UNSIGNED="${DST%.apk}-unsigned.apk"

              cp "$SRC" "$DST"

              # zipalign（必须先对齐再签名）
              "$BUILD_TOOLS/zipalign" -f -p 4 "$DST" "$UNSIGNED"
              mv "$UNSIGNED" "$DST"

              # apksigner 签名（v1+v2+v3）
              "$BUILD_TOOLS/apksigner" sign \
                --ks "$KSTORE" \
                --ks-key-alias "$ANDROID_KEY_ALIAS" \
                --ks-pass "pass:$ANDROID_KEYSTORE_PASS" \
                --key-pass "pass:$ANDROID_KEY_PASS" \
                --v1-signing-enabled true \
                --v2-signing-enabled true \
                --v3-signing-enabled true \
                "$DST"

              # 验证签名
              "$BUILD_TOOLS/apksigner" verify --verbose "$DST" | head -5
              echo "Signed: $DST"
            }

            # 签名正式版
            PROD_APK=$(find artifacts/android-prod -name '*.apk' | head -1)
            if [ -n "$PROD_APK" ]; then
              sign_apk "$PROD_APK" "staging-android/ChildNotes-android-prod-${{ github.ref_name }}.apk"
            fi

            # 签名开发版
            DEV_APK=$(find artifacts/android-dev -name '*.apk' | head -1)
            if [ -n "$DEV_APK" ]; then
              sign_apk "$DEV_APK" "staging-android/ChildNotes-android-dev-${{ github.ref_name }}.apk"
            fi
          fi

          if [ -z "$(ls -A staging-android 2>/dev/null)" ]; then
            echo "::error::未找到 APK 产物"
            exit 1
          fi
          ls -la staging-android/
          echo "::notice::APK created and signed: ChildNotes-android-prod-${{ github.ref_name }}.apk, ChildNotes-android-dev-${{ github.ref_name }}.apk"

      # ===============================================================
      # 客户端 - iOS 版
      # ---------------------------------------------------------------
      # 不在 CI 构建。原因：
      # 1. .NET 10 iOS SDK 强制 PublishTrimmed=true，ILLink 在 macOS runner 上
      #    分析大量程序集耗时极长（>45min），各种关闭 trimming 的属性组合均无效。
      # 2. CI 产物是未签名 .app，用户仍需 Mac + 开发者证书重签才能安装，
      #    能重签的用户也能自行 `dotnet publish`。
      # 本地构建命令（需 Mac + Xcode + dotnet workload install ios）：
      #   dotnet publish ChildNotes.iOS/ChildNotes.iOS.csproj \
      #     -c Release -f net10.0-ios -r ios-arm64 \
      #     -p:RuntimeIdentifier=ios-arm64 \
      #     -p:EnableCodeSigning=false -p:CodesignEntitlements= \
      #     -p:PublishTrimmed=true -p:MtouchLink=None -p:TrimMode=copy \
      #     -o ./artifacts/ios
      # ===============================================================

      # ===============================================================
      # 服务端 - Linux Ubuntu 版
      # ===============================================================
      - name: Build backend (publish)
        if: matrix.target == 'backend'
        shell: pwsh
        working-directory: ChildNotes.Backend
        run: |
          # 以独立部署(SCD)方式发布，产物内含运行时，目标机器无需额外安装 .NET
          dotnet publish ChildNotes.Api/ChildNotes.Api.csproj `
            -c Release `
            -r linux-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:PublishTrimmed=false `
            -p:Version=${{ steps.version.outputs.version }} `
            -o ../artifacts/backend

          # 确保配置文件随产物输出（dotnet publish 默认会复制，这里再显式确认）
          Copy-Item ChildNotes.Api/appsettings.json ../artifacts/backend/ -Force -ErrorAction SilentlyContinue

          # 写入版本号文件，供后续验证步骤读取（不依赖运行 DLL，避免 Web 应用启动卡住）
          '${{ steps.version.outputs.version }}' | Set-Content -NoNewline ../artifacts/backend/version.txt

      - name: Archive backend artifacts
        if: matrix.target == 'backend'
        shell: bash
        run: |
          mkdir -p staging-backend
          cp -r artifacts/backend/* staging-backend/
          tar -czf "ChildNotes-backend-${{ github.ref_name }}.tar.gz" -C "staging-backend" .
          echo "::notice::Archive created: ChildNotes-backend-${{ github.ref_name }}.tar.gz"

      # ===============================================================
      # 版本号验证：确保构建产物中的版本号与 git tag 一致
      # ===============================================================
      - name: Verify version in build artifacts
        if: always() && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          EXPECTED="${{ steps.version.outputs.version }}"
          echo "Expected version: $EXPECTED"

          if [ "${{ matrix.target }}" = "backend" ] && [ -d "artifacts/backend" ]; then
            # 读取构建时写入的 version.txt，避免运行 DLL（Web 应用会启动主机不退出）
            if [ ! -f "artifacts/backend/version.txt" ]; then
              echo "::error::后端版本号文件不存在: artifacts/backend/version.txt"
              exit 1
            fi
            ACTUAL=$(cat artifacts/backend/version.txt | tr -d '[:space:]')
            echo "Backend version (from version.txt): $ACTUAL"
            if [[ "$ACTUAL" != "$EXPECTED" ]]; then
              echo "::error::后端版本号不匹配！期望: $EXPECTED, 实际: $ACTUAL"
              exit 1
            fi
            echo "::notice::后端版本号验证通过: $ACTUAL"
          fi

          if [ "${{ matrix.target }}" = "android" ] && [ -d "staging-android" ]; then
            # Android 版本号在构建日志中可见（通过 -p:Version 传入）
            echo "::notice::Android 版本号已通过 -p:Version=$EXPECTED 注入"
          fi

          if [ "${{ matrix.target }}" = "windows" ] && [ -d "artifacts/windows" ]; then
            # Windows 版本号验证
            echo "::notice::Windows 版本号已通过 -p:Version=$EXPECTED 注入"
          fi

          echo "::notice::[${{ matrix.target }}] 版本号验证完成: $EXPECTED"

      # ===============================================================
      # 上传构建产物（workflow artifact，供 release job 下载）
      # ===============================================================
      - name: Upload build artifact (windows)
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ChildNotes-windows-${{ github.ref_name }}
          path: ChildNotes-windows-${{ github.ref_name }}.zip
          if-no-files-found: error
          retention-days: 1

      - name: Upload build artifact (android)
        if: matrix.target == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: ChildNotes-android-${{ github.ref_name }}
          path: |
            staging-android/ChildNotes-android-prod-${{ github.ref_name }}.apk
            staging-android/ChildNotes-android-dev-${{ github.ref_name }}.apk
          if-no-files-found: error
          retention-days: 1

      - name: Upload build artifact (backend)
        if: matrix.target == 'backend'
        uses: actions/upload-artifact@v4
        with:
          name: ChildNotes-backend-${{ github.ref_name }}
          path: ChildNotes-backend-${{ github.ref_name }}.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Summarize build status
        if: always()
        shell: pwsh
        run: |
          $status = '${{ job.status }}'
          if ($status -eq 'success') {
            Write-Host "::notice::[${{ matrix.target }}] 构建成功。产物已打包。"
          } else {
            Write-Host "::error::[${{ matrix.target }}] 构建失败 (status=$status)，请检查上方日志。"
          }

  # -----------------------------------------------------------------
  # 发布 Release：所有平台构建完成后，将压缩包作为 GitHub Release 资源发布
  # （Docker 镜像构建已临时禁用，使用 Linux 服务器直接部署）
  # -----------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 10

    steps:
      - name: Checkout (for changelog generation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 完整历史，用于生成版本变更说明

      - name: Generate release body
        id: body
        shell: bash
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          # 获取上一个 tag（按创建时间倒序，排除当前 tag）
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --no-merges --pretty=format:"%s" "$CURRENT_TAG" 2>/dev/null || echo "")
            RANGE_DESC="初始版本至 ${CURRENT_TAG}"
            COMPARE_URL=""
          else
            COMMITS=$(git log --no-merges --pretty=format:"%s" "${PREVIOUS_TAG}..${CURRENT_TAG}" 2>/dev/null || echo "")
            RANGE_DESC="${PREVIOUS_TAG} → ${CURRENT_TAG}"
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
          fi

          # 按 Conventional Commits 分类
          FEAT=""; FIX=""; PERF=""; API=""; COMPAT=""; OTHER=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            if [[ "$line" =~ ^feat(\([a-zA-Z0-9_-]+\))?:[[:space:]]*(.+)$ ]]; then
              FEAT="${FEAT}- ${BASH_REMATCH[2]}"$'\n'
            elif [[ "$line" =~ ^fix(\([a-zA-Z0-9_-]+\))?:[[:space:]]*(.+)$ ]]; then
              FIX="${FIX}- ${BASH_REMATCH[2]}"$'\n'
            elif [[ "$line" =~ ^perf(\([a-zA-Z0-9_-]+\))?:[[:space:]]*(.+)$ ]]; then
              PERF="${PERF}- ${BASH_REMATCH[2]}"$'\n'
            elif [[ "$line" =~ ^(api|refactor\(api\))(\([a-zA-Z0-9_-]+\))?:[[:space:]]*(.+)$ ]]; then
              API="${API}- ${BASH_REMATCH[3]}"$'\n'
            elif [[ "$line" =~ ^breaking(\([a-zA-Z0-9_-]+\))?:[[:space:]]*(.+)$ ]]; then
              COMPAT="${COMPAT}- ${BASH_REMATCH[2]}"$'\n'
            elif [[ "$line" =~ ^refactor(\([a-zA-Z0-9_-]+\))?:[[:space:]]*(.+)$ ]]; then
              OTHER="${OTHER}- ${BASH_REMATCH[2]}"$'\n'
            elif [[ "$line" =~ ^(docs|style|chore|test|ci|build)(\([a-zA-Z0-9_-]+\))?:[[:space:]]*(.+)$ ]]; then
              OTHER="${OTHER}- ${BASH_REMATCH[3]}"$'\n'
            else
              OTHER="${OTHER}- ${line}"$'\n'
            fi
          done <<< "$COMMITS"

          # 组装完整 Release body
          {
            echo "## 构建产物"
            echo ""
            echo "本次发布包含以下平台的编译产物："
            echo ""
            echo "| 平台 | 文件 | 说明 |"
            echo "| ---- | ---- | ---- |"
            echo "| Windows 桌面 | \`ChildNotes-windows-*.zip\` | 自包含（self-contained），解压后运行可执行文件，无需安装 .NET |"
            echo "| Android 正式版 | \`ChildNotes-android-prod-*.apk\` | 正式版 APK（com.babydiary.app），移除开发者选项，面向普通用户 |"
            echo "| Android 开发版 | \`ChildNotes-android-dev-*.apk\` | 开发版 APK（com.babydiary.app.dev），保留开发者选项与日志导出，可与正式版共存 |"
            echo "| 服务端 | \`ChildNotes-backend-*.tar.gz\` | ASP.NET Core 后端 API，Linux Ubuntu 自包含部署 |"
            echo ""
            echo "## 版本变更说明"
            echo ""
            echo -n "**版本范围：** \`${RANGE_DESC}\`"
            if [ -n "$COMPARE_URL" ]; then
              echo " | [查看完整代码对比](${COMPARE_URL})"
            else
              echo ""
            fi
            echo ""

            [ -n "$FEAT" ]   && { echo "### 功能新增";   echo "$FEAT"; }
            [ -n "$FIX" ]    && { echo "### 问题修复";   echo "$FIX"; }
            [ -n "$PERF" ]   && { echo "### 性能优化";   echo "$PERF"; }
            [ -n "$API" ]    && { echo "### 接口变更";   echo "$API"; }
            [ -n "$COMPAT" ] && { echo "### 兼容性调整"; echo "$COMPAT"; }
            [ -n "$OTHER" ]  && { echo "### 其他重要更新"; echo "$OTHER"; }

            if [ -z "$FEAT$FIX$PERF$API$COMPAT$OTHER" ]; then
              echo "本版本无显著代码变更记录。"
            fi

            echo ""
            echo "## 构建状态"
            echo "- 构建矩阵结果：${{ needs.build.result }}"
            echo "- 对应 commit：${{ github.sha }}"
          } > body.md

          echo "=== Generated Release Body ==="
          cat body.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: false

      - name: Flatten artifacts for release upload
        shell: bash
        run: |
          mkdir -p upload
          find release-assets -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.apk' \) -exec cp {} upload/ \;
          ls -la upload/

      - name: Check build matrix status
        id: status
        shell: bash
        run: |
          # needs.build.result: success / failure / cancelled
          RESULT="${{ needs.build.result }}"
          echo "result=$RESULT" >> $GITHUB_OUTPUT
          if [ "$RESULT" != "success" ]; then
            echo "::error::构建矩阵未全部成功 (result=$RESULT)，终止发布。"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: body.md
          fail_on_unmatched_files: true
          files: upload/*

      - name: Release summary
        if: always()
        shell: bash
        run: |
          echo "::notice::Release 发布完成，访问 https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }} 下载各平台产物。"
